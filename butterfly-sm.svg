<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 90 90">
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); opacity: 0.85; }
      50%       { transform: translateY(-4px) scale(1.05); opacity: 1; }
    }
    .w { transform-origin: 45px 45px; animation: float 4s ease-in-out infinite; }
  </style>
  <image class="w" href="data:image/png;base64," width="90" height="90"/>
</svg>